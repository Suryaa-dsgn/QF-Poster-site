<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quickflows.ai — AI-Powered ACO Operations</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── POSTER ── */

    .poster-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .poster-img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* ── OVERLAY ZONES ── */

    .zone {
      position: absolute;
      cursor: pointer;
      background: transparent;
      border-radius: 6px;
      transition: background 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .zone:hover {
      background: rgba(124, 58, 237, 0.05);
      box-shadow: inset 0 0 28px rgba(124, 58, 237, 0.1);
    }

    .zone:active {
      background: rgba(124, 58, 237, 0.1);
      box-shadow: inset 0 0 28px rgba(124, 58, 237, 0.15);
    }

    .zone:focus-visible {
      outline: 2px solid rgba(124, 58, 237, 0.7);
      outline-offset: 2px;
    }

    /* Demo zone — subtler hover, no purple glow */
    .demo-zone {
      display: block;
      text-decoration: none;
    }

    .demo-zone:hover {
      background: rgba(255, 255, 255, 0.07);
      box-shadow: none;
    }

    /* ── MODAL BACKDROP ── */

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px 12px 32px;
      overflow-y: auto;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── MODAL BOX ── */

    .modal-box {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transform: translateY(20px);
      transition: transform 0.25s ease;
    }

    .modal-backdrop.open .modal-box {
      transform: translateY(0);
    }

    /* ── MODAL HEADER ── */

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.1);
      border: 0.5px solid rgba(255, 255, 255, 0.22);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 24px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      min-height: 44px;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .btn-close {
      background: rgba(255, 255, 255, 0.1);
      border: 0.5px solid rgba(255, 255, 255, 0.22);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-close:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    /* ── MODAL POSTER ── */

    .modal-poster-wrap {
      position: relative;
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      background: #080814;
      box-shadow: 0 0 0 0.5px rgba(124, 58, 237, 0.3);
    }

    .modal-poster-img {
      display: block;
      width: 100%;
      height: auto;
    }

    .modal-demo-zone {
      position: absolute;
      top: 94.5%;
      left: 52%;
      width: 33%;
      height: 4.5%;
      display: block;
      text-decoration: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease;
    }

    .modal-demo-zone:hover {
      background: rgba(255, 255, 255, 0.07);
    }
  </style>
</head>
<body>

  <!-- MAIN POSTER -->
  <div class="poster-container">
    <img
      src="images/main-poster.png"
      alt="Quickflows.ai — End-to-End ACO Operations, Powered by AI Agents"
      class="poster-img"
      id="poster-img"
    />

    <!-- CARD OVERLAY ZONES (6 total) -->
    <div class="zone" data-poster="referral"
      role="button" tabindex="0"
      aria-label="Open AI-Powered Referral Management"
      style="top:32%; left:1%; width:31.5%; height:20%;">
    </div>

    <div class="zone" data-poster="health-risk"
      role="button" tabindex="0"
      aria-label="Open Patient Health and Risk Intelligence"
      style="top:32%; left:34%; width:32%; height:20%;">
    </div>

    <div class="zone" data-poster="cost-util"
      role="button" tabindex="0"
      aria-label="Open Cost and Utilization Optimization"
      style="top:32%; left:67%; width:32%; height:20%;">
    </div>

    <div class="zone" data-poster="care-gap"
      role="button" tabindex="0"
      aria-label="Open Care Gap Closure Automation"
      style="top:52.5%; left:1%; width:31.5%; height:20%;">
    </div>

    <div class="zone" data-poster="claims"
      role="button" tabindex="0"
      aria-label="Open Contract and Claims Intelligence"
      style="top:52.5%; left:34%; width:32%; height:20%;">
    </div>

    <div class="zone" data-poster="engagement"
      role="button" tabindex="0"
      aria-label="Open Patient Engagement Automation"
      style="top:52.5%; left:67%; width:32%; height:20%;">
    </div>

    <!-- DEMO CTA ZONE -->
    <a class="zone demo-zone"
      href="mailto:K.mcdonnell@quickflows.ai?subject=Demo%20Request%20%E2%80%94%20Quickflows.ai"
      aria-label="Schedule a demo — opens email"
      style="top:94.5%; left:52%; width:33%; height:4.5%;">
    </a>
  </div>

  <!-- MODAL LIGHTBOX -->
  <div class="modal-backdrop" id="modal" aria-hidden="true" aria-modal="true" role="dialog">
    <div class="modal-box" id="modal-box">

      <div class="modal-header">
        <button class="btn-back" onclick="closeModal()">← Back to All Features</button>
        <button class="btn-close" onclick="closeModal()" aria-label="Close">✕</button>
      </div>

      <div class="modal-poster-wrap">
        <img src="" alt="" class="modal-poster-img" id="modal-img" />
        <a class="modal-demo-zone"
          href="mailto:K.mcdonnell@quickflows.ai?subject=Demo%20Request%20%E2%80%94%20Quickflows.ai"
          aria-label="Schedule a demo — opens email">
        </a>
      </div>

    </div>
  </div>

  <script>
    const POSTERS = {
      'referral':    { src: 'images/referral.png',    alt: 'AI-Powered Referral Management' },
      'health-risk': { src: 'images/health-risk.png', alt: 'Patient Health & Risk Intelligence' },
      'cost-util':   { src: 'images/cost-util.png',   alt: 'Cost & Utilization Optimization' },
      'care-gap':    { src: 'images/care-gap.png',    alt: 'Care Gap Closure Automation' },
      'claims':      { src: 'images/claims.png',      alt: 'Contract & Claims Intelligence' },
      'engagement':  { src: 'images/engagement.png',  alt: 'Patient Engagement Automation' },
    };

    const modal    = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');
    const modalBox = document.getElementById('modal-box');

    function openModal(id) {
      const p = POSTERS[id];
      if (!p) return;
      modalImg.src = p.src;
      modalImg.alt = p.alt;
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      modal.scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      setTimeout(() => { modalImg.src = ''; }, 280);
    }

    // Zone clicks
    document.querySelectorAll('.zone[data-poster]').forEach(zone => {
      zone.addEventListener('click', () => openModal(zone.dataset.poster));
      zone.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openModal(zone.dataset.poster);
        }
      });
    });

    // Close on backdrop click (not on modal box itself)
    modal.addEventListener('click', e => {
      if (!modalBox.contains(e.target)) closeModal();
    });

    // Close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
    });
  </script>
</body>
</html>
